project_name: multi_style_transfer
seed: 42
device: cuda

model:
  input_nc: 3
  output_nc: 3
  ngf: 64
  ndf: 64
  n_blocks: 6

train:
  resize_size: 286
  image_size: 256
  batch_size: 1
  num_workers: 2
  epochs: 100
  lr: 0.0002
  beta1: 0.5
  lambda_cycle: 10.0
  lambda_identity: 5.0
  use_amp: true
  save_freq: 5
  sample_freq: 1