# 项目名称。训练脚本会把它写进日志或实验标识里，方便区分不同项目。
project_name: multi_style_transfer

# 固定随机种子，尽量让数据打乱、参数初始化等随机过程可复现。
seed: 42

# 训练设备。cuda 表示使用显卡；如果没有 GPU，可以改成 cpu。
device: cuda

# 模型结构配置。
# 这一段决定生成器和判别器“长什么样”，属于网络容量相关的参数。
model:
  # 输入图片通道数。普通彩色图片是 RGB，所以这里是 3。
  input_nc: 3
  # 输出图片通道数。风格迁移后仍然输出 RGB 图，因此也是 3。
  output_nc: 3
  # 生成器的基础通道宽度。数值越大，模型越“宽”，计算和显存开销也越大。
  ngf: 64
  # 判别器的基础通道宽度。数值越大，判别能力通常越强，但开销也更大。
  ndf: 64
  # 生成器中的残差块数量。块越多，表达能力通常越强，但训练会更慢。
  n_blocks: 6

# 训练超参数配置。
# 这一段主要控制：图片怎么进模型、学多快、训多久、多久保存一次结果。
train:
  # 先把图片缩放到这个较大的尺寸，再随机裁剪，属于数据增强的一部分。
  resize_size: 286
  # 最终输入模型的图片尺寸。这里统一成 256x256。
  image_size: 256
  # 每次迭代喂给模型的图片张数。1 是 CycleGAN 类项目里很常见的设置。
  batch_size: 1
  # 数据加载线程数。作用是提前把图片读出来，减少训练等待时间。
  num_workers: 2
  # 总训练轮数。1 轮表示把整个训练集大致看一遍。
  epochs: 100
  # 学习率。决定参数每次更新的步长大小。
  lr: 0.0002
  # Adam 优化器的 beta1 参数，常用默认值之一。
  beta1: 0.5
  # 循环一致性损失的权重。数值越大，越强调“转过去再转回来要像原图”。
  lambda_cycle: 10.0
  # 恒等损失的权重。数值越大，越强调“本来就是目标风格时不要乱改”。
  lambda_identity: 5.0
  # 是否启用混合精度训练。开启后通常更省显存，也可能更快。
  use_amp: true
  # 每隔多少个 epoch 保存一次模型权重。
  save_freq: 5
  # 每隔多少个 epoch 导出一次样例图片，方便观察训练效果。
  sample_freq: 1